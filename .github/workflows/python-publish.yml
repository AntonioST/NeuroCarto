# This workflow will upload a Python Package using Twine when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Upload Python Package

on:
  push:
    #    branches:
    #    - main
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.10', '3.11', '3.12', '3.13', '3.14' ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[full]

      - name: Init submodule
        run: |
          git submodule update --init tests/ProbeTable

      - name: Run tests
        run: |
          python -m unittest tests/test_imro_io.py tests/test_npx_probe.py tests/test_probe_oper.py tests/test_util_blueprint.py

  release-build:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    needs:
      - tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: neurocarto
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    needs:
      - release-build

    permissions:
      id-token: write

    environment:
      name: release
      url: https://pypi.org/project/neurocarto/

    steps:
    - name: Retrieve release distributions
      uses: actions/download-artifact@v4
      with:
        name: neurocarto
        path: dist/

    - name: Publish release distribution to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist/
